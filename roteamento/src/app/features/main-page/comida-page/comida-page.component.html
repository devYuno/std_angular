<h1>Comidas</h1>

<div class="comidas">
    <div class="comida" *ngFor="let comida of comidas; track: $index">
        <app-card (click)="openModal(comida)" [comida]="comida">

        </app-card>
    </div>
</div>

<app-comida-details-modal *ngIf="flagModal" [comida]="selectedComida" (onClose)="closeModal($event)"></app-comida-details-modal>
