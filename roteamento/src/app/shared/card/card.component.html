<div class="card">
    <div class="row">
        <img src={{comida.image}} alt="">
        <div class="box-elements">
            <h3>{{comida.name}}</h3>
            <p>{{comida.category}}</p>
            <p>R$ {{comida.price}}</p>
        </div>
    </div>
    <p style="margin-bottom: 5px;">Descrição: {{comida.name}}</p>
    <p>Sabor: {{comida.flavor}}</p>
</div>
