<div class="page">
    <app-modal-auth [Title]="'Login'" class="modal-login">
        <form action="get" [formGroup]="loginForm" (ngSubmit)="login()" style="width: 100%; height: 100%;">
            <div class="row">
                <input type="text" placeholder="E-mail" formControlName="username">
            </div>
            <div class="row">
                <input type="text" placeholder="Senha" formControlName="password">
            </div>
            <div class="row">
                <button class="btn-default" type="submit">Entrar</button>
            </div>
            <div class="row">
                <div class="space"></div>
                <a href="register">Não tenho uma conta</a>
                <div class="space"></div>
            </div>
        </form>

    </app-modal-auth>

</div>
<router-outlet></router-outlet>
